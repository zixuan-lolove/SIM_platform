# MOSQUITTO MQTT BROKER CONFIGURATION
# Local test broker for SIM platform cloud mocking

# Listen on port 11883 (matches cloud_config.ini default)
listener 11883 127.0.0.1
protocol mqtt

# Allow all connections — 不校验用户名密码
allow_anonymous true

# Persistence
persistence false

# Logging
log_dest stdout
log_type error
connection_messages true
